name: Salus AI CI Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: salus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Kodu Klonla
        uses: actions/checkout@v3

      - name: Node.js Kurulumu
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: './sunucu/package-lock.json'

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Sunucu test ve bağımlılık adımları
      - name: Sunucu Bağımlılıklarını Yükle
        run: |
          cd sunucu
          npm install

      - name: Python Modülleri Testini Çalıştır
        run: |
          cd sunucu
          node test_araclar.js
        env:
          VERITABANI_URL: postgresql://postgres:password@localhost:5432/salus_test
          REDIS_URL: redis://localhost:6379
          JWT_GIZLI_ANAHTAR: test_secret_key

      # İstemci build ve bağımlılık adımları
      - name: İstemci Bağımlılıklarını Yükle
        run: |
          cd istemci
          npm install

      - name: İstemciyi Build Et
        run: |
          cd istemci
          npm run build
